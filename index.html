<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenotazione Lezioni Palestra</title>
    
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales-all.min.js'></script>

    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        #calendar { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .instructions { text-align: center; margin-bottom: 20px; color: #333; }
    </style>
</head>
<body>

    <div class="instructions">
        <h2>Calendario Prenotazioni Palestra</h2>
        <p>Clicca su un giorno per prenotare la tua lezione.</p>
    </div>

    <div id='calendar'></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');

            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'it', // Imposta lingua italiana
                selectable: true,
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek'
                },
                
                // Funzione per gestire il click e la prenotazione
                dateClick: function(info) {
                    let tipoLezione = prompt("Inserisci il tipo di lezione (es. Pilates, CrossFit, Pesi):");
                    
                    if (tipoLezione) {
                        calendar.addEvent({
                            title: tipoLezione,
                            start: info.dateStr,
                            allDay: true,
                            backgroundColor: '#2c3e50',
                            borderColor: '#2c3e50'
                        });
                        alert("Lezione di " + tipoLezione + " prenotata per il " + info.dateStr);
                    }
                },

                // Esempio di lezioni già caricate
                events: [
                    {
                        title: 'Allenamento Gambe',
                        start: '2026-03-25'
                    }
                ]
            });

            calendar.render();
        });
    </script>
</body>
</html>
